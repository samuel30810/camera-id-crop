<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>證件拍照</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Camera screen ── */
    #camera-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* top/left/width/height are set by JS */
    #guide-frame {
      position: absolute;
      border: 3px solid white;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      cursor: move;
      touch-action: none;
      user-select: none;
    }

    #guide-label {
      position: absolute;
      top: -30px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    /* ── Resize handles (4 corners) ── */
    .resize-handle {
      position: absolute;
      width: 36px;
      height: 36px;
      touch-action: none;
      cursor: nw-resize;
    }

    .resize-handle[data-corner="tl"] {
      top: -3px; left: -3px;
      border-top: 4px solid white;
      border-left: 4px solid white;
      cursor: nw-resize;
    }
    .resize-handle[data-corner="tr"] {
      top: -3px; right: -3px;
      border-top: 4px solid white;
      border-right: 4px solid white;
      cursor: ne-resize;
    }
    .resize-handle[data-corner="bl"] {
      bottom: -3px; left: -3px;
      border-bottom: 4px solid white;
      border-left: 4px solid white;
      cursor: sw-resize;
    }
    .resize-handle[data-corner="br"] {
      bottom: -3px; right: -3px;
      border-bottom: 4px solid white;
      border-right: 4px solid white;
      cursor: se-resize;
    }

    #debug-info {
      position: fixed;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: lime;
      background: rgba(0, 0, 0, 0.45);
      padding: 4px 7px;
      border-radius: 3px;
      font-family: monospace;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }

    #capture-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 4px solid white;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: background 0.15s;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #capture-btn::after {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
    }

    #capture-btn:active {
      background: rgba(255, 255, 255, 0.5);
    }

    #capture-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      padding: 24px 28px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.7;
      display: none;
      z-index: 20;
      max-width: 80vw;
    }

    /* ── Result screen ── */
    #result-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #result-label {
      color: rgba(255, 255, 255, 0.55);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    #result-img {
      max-width: 90vw;
      max-height: 65vh;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
    }

    #retake-btn {
      padding: 12px 36px;
      border-radius: 24px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      background: transparent;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #retake-btn:active {
      background: rgba(255, 255, 255, 0.12);
    }
  </style>
</head>
<body>

<!-- Camera screen -->
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <div id="guide-frame">
    <div id="guide-label">拖曳移動 · 角落縮放</div>
    <div class="resize-handle" data-corner="tl"></div>
    <div class="resize-handle" data-corner="tr"></div>
    <div class="resize-handle" data-corner="bl"></div>
    <div class="resize-handle" data-corner="br"></div>
  </div>
  <div id="debug-info">等待相機...</div>
  <button id="capture-btn" disabled aria-label="拍照"></button>
  <div id="error-msg"></div>
</div>

<!-- Result screen -->
<div id="result-container">
  <div id="result-label">裁切結果預覽</div>
  <img id="result-img" alt="裁切結果">
  <button id="retake-btn">重拍</button>
</div>

<!-- Hidden canvas for cropping -->
<canvas id="canvas" style="display:none"></canvas>

<script>
  const video           = document.getElementById('video');
  const guideFrame      = document.getElementById('guide-frame');
  const debugInfo       = document.getElementById('debug-info');
  const captureBtn      = document.getElementById('capture-btn');
  const errorMsg        = document.getElementById('error-msg');
  const cameraContainer = document.getElementById('camera-container');
  const resultContainer = document.getElementById('result-container');
  const resultImg       = document.getElementById('result-img');
  const retakeBtn       = document.getElementById('retake-btn');
  const canvas          = document.getElementById('canvas');
  const ctx             = canvas.getContext('2d');

  let stream    = null;
  let dragState = null;
  const MIN_W   = 80;
  const MIN_H   = 50;

  // ── Error display ──
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    debugInfo.style.display = 'none';
    captureBtn.disabled = true;
  }

  // ── Initialize frame at center with 1.58:1 ratio ──
  function initFramePosition() {
    const cW = cameraContainer.offsetWidth;
    const cH = cameraContainer.offsetHeight;
    const w  = Math.min(cW * 0.85, cH * 0.85 * 1.58);
    const h  = w / 1.58;
    guideFrame.style.width  = w + 'px';
    guideFrame.style.height = h + 'px';
    guideFrame.style.left   = ((cW - w) / 2) + 'px';
    guideFrame.style.top    = ((cH - h) / 2) + 'px';
  }

  // ── Drag: move entire frame ──
  guideFrame.addEventListener('pointerdown', (e) => {
    if (e.target.dataset.corner) return; // let resize handles take over
    e.preventDefault();
    dragState = {
      type:     'drag',
      startX:   e.clientX,
      startY:   e.clientY,
      origLeft: parseInt(guideFrame.style.left) || 0,
      origTop:  parseInt(guideFrame.style.top)  || 0,
    };
    guideFrame.setPointerCapture(e.pointerId);
  });

  // ── Resize: drag from corner handles ──
  document.querySelectorAll('.resize-handle').forEach(handle => {
    handle.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragState = {
        type:     'resize',
        corner:   handle.dataset.corner,
        startX:   e.clientX,
        startY:   e.clientY,
        origLeft: parseInt(guideFrame.style.left)   || 0,
        origTop:  parseInt(guideFrame.style.top)    || 0,
        origW:    guideFrame.offsetWidth,
        origH:    guideFrame.offsetHeight,
      };
      handle.setPointerCapture(e.pointerId);
    });
  });

  window.addEventListener('pointermove', (e) => {
    if (!dragState) return;

    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    const cW = cameraContainer.offsetWidth;
    const cH = cameraContainer.offsetHeight;

    if (dragState.type === 'drag') {
      const fW = guideFrame.offsetWidth;
      const fH = guideFrame.offsetHeight;
      guideFrame.style.left = Math.max(0, Math.min(cW - fW, dragState.origLeft + dx)) + 'px';
      guideFrame.style.top  = Math.max(0, Math.min(cH - fH, dragState.origTop  + dy)) + 'px';

    } else {
      let { origLeft, origTop, origW, origH, corner } = dragState;
      let newW = origW, newH = origH, newLeft = origLeft, newTop = origTop;

      if (corner.includes('r')) newW = Math.max(MIN_W, origW + dx);
      if (corner.includes('l')) { newW = Math.max(MIN_W, origW - dx); newLeft = origLeft + origW - newW; }
      if (corner.includes('b')) newH = Math.max(MIN_H, origH + dy);
      if (corner.includes('t')) { newH = Math.max(MIN_H, origH - dy); newTop = origTop + origH - newH; }

      // Clamp within viewport
      newLeft = Math.max(0, Math.min(cW - MIN_W, newLeft));
      newTop  = Math.max(0, Math.min(cH - MIN_H, newTop));
      newW    = Math.max(MIN_W, Math.min(cW - newLeft, newW));
      newH    = Math.max(MIN_H, Math.min(cH - newTop,  newH));

      guideFrame.style.left   = newLeft + 'px';
      guideFrame.style.top    = newTop  + 'px';
      guideFrame.style.width  = newW    + 'px';
      guideFrame.style.height = newH    + 'px';
    }

    updateDebug();
  });

  window.addEventListener('pointerup',     () => { dragState = null; });
  window.addEventListener('pointercancel', () => { dragState = null; });

  // ── Start camera ──
  async function startCamera() {
    errorMsg.style.display  = 'none';
    debugInfo.style.display = '';
    captureBtn.disabled     = true;
    debugInfo.textContent   = '等待相機...';

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });
    } catch (_) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
      } catch (err) {
        showError('無法存取相機。\n請確認已允許相機存取權限後重新整理頁面。');
        return;
      }
    }

    video.srcObject = stream;
  }

  video.addEventListener('loadedmetadata', () => {
    captureBtn.disabled = false;
    updateDebug();
  });

  // ── Calculate crop parameters (compensates for object-fit: cover offset) ──
  function calcCropParams() {
    const displayW = video.offsetWidth;
    const displayH = video.offsetHeight;
    const vW = video.videoWidth;
    const vH = video.videoHeight;

    const ratio   = Math.max(displayW / vW, displayH / vH);
    const offsetX = (vW - displayW / ratio) / 2;
    const offsetY = (vH - displayH / ratio) / 2;

    const frameRect = guideFrame.getBoundingClientRect();
    const videoRect = video.getBoundingClientRect();

    const cssX = frameRect.left - videoRect.left;
    const cssY = frameRect.top  - videoRect.top;
    const cssW = frameRect.width;
    const cssH = frameRect.height;

    const srcX = Math.max(0, cssX / ratio + offsetX);
    const srcY = Math.max(0, cssY / ratio + offsetY);
    const srcW = Math.min(cssW / ratio, vW - srcX);
    const srcH = Math.min(cssH / ratio, vH - srcY);

    return { ratio, offsetX, offsetY, srcX, srcY, srcW, srcH };
  }

  // ── Debug overlay — shows current frame ratio for prototype testing ──
  function updateDebug() {
    if (!video.videoWidth) return;
    const p          = calcCropParams();
    const frameRatio = (guideFrame.offsetWidth / guideFrame.offsetHeight).toFixed(3);
    debugInfo.textContent =
      `框 ${frameRatio}:1  |  ` +
      `src (${p.srcX.toFixed(0)}, ${p.srcY.toFixed(0)})  ` +
      `${p.srcW.toFixed(0)}×${p.srcH.toFixed(0)}px`;
  }

  window.addEventListener('resize', () => {
    if (!dragState) initFramePosition();
    updateDebug();
  });

  // ── Capture ──
  captureBtn.addEventListener('click', () => {
    if (!video.videoWidth) return;

    const p = calcCropParams();
    canvas.width  = Math.round(p.srcW);
    canvas.height = Math.round(p.srcH);
    ctx.drawImage(video, p.srcX, p.srcY, p.srcW, p.srcH, 0, 0, canvas.width, canvas.height);

    resultImg.src = canvas.toDataURL('image/jpeg', 0.92);

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }

    cameraContainer.style.display = 'none';
    resultContainer.style.display = 'flex';
  });

  // ── Retake ──
  retakeBtn.addEventListener('click', () => {
    resultContainer.style.display = 'none';
    cameraContainer.style.display = 'block';
    startCamera().catch(() => showError('無法存取相機。\n請確認已允許相機存取權限後重新整理頁面。'));
  });

  // ── Init ──
  initFramePosition();
  startCamera().catch(() => showError('無法存取相機。\n請確認已允許相機存取權限後重新整理頁面。'));
</script>

</body>
</html>
