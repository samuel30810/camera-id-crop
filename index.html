<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>證件拍照</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Camera screen ── */
    #camera-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* top/left/width/height are set by JS */
    #guide-frame {
      position: absolute;
      border: 3px solid white;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      cursor: move;
      touch-action: none;
      user-select: none;
    }

    #guide-label {
      position: absolute;
      top: -30px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-size: 13px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    /* ── Resize handles (4 corners) ── */
    .resize-handle {
      position: absolute;
      width: 36px;
      height: 36px;
      touch-action: none;
      cursor: nw-resize;
    }

    .resize-handle[data-corner="tl"] {
      top: -3px; left: -3px;
      border-top: 4px solid white;
      border-left: 4px solid white;
      cursor: nw-resize;
    }
    .resize-handle[data-corner="tr"] {
      top: -3px; right: -3px;
      border-top: 4px solid white;
      border-right: 4px solid white;
      cursor: ne-resize;
    }
    .resize-handle[data-corner="bl"] {
      bottom: -3px; left: -3px;
      border-bottom: 4px solid white;
      border-left: 4px solid white;
      cursor: sw-resize;
    }
    .resize-handle[data-corner="br"] {
      bottom: -3px; right: -3px;
      border-bottom: 4px solid white;
      border-right: 4px solid white;
      cursor: se-resize;
    }

    #debug-info {
      position: fixed;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: lime;
      background: rgba(0, 0, 0, 0.45);
      padding: 4px 7px;
      border-radius: 3px;
      font-family: monospace;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }

    #capture-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: 4px solid white;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: background 0.15s;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #capture-btn::after {
      content: '';
      display: block;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: white;
    }

    #capture-btn:active {
      background: rgba(255, 255, 255, 0.5);
    }

    #capture-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #error-msg {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      padding: 24px 28px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.7;
      display: none;
      z-index: 20;
      max-width: 80vw;
    }

    /* ── Result screen ── */
    #result-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #result-label {
      color: rgba(255, 255, 255, 0.55);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    #result-img {
      max-width: 90vw;
      max-height: 65vh;
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
    }

    #retake-btn {
      padding: 12px 36px;
      border-radius: 24px;
      border: 2px solid rgba(255, 255, 255, 0.7);
      background: transparent;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #retake-btn:active {
      background: rgba(255, 255, 255, 0.12);
    }
    /* ── Burst button ── */
    #burst-btn {
      position: fixed;
      bottom: 40px;
      left: calc(50% - 90px);
      transform: translateX(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.35);
      color: white;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    #burst-btn:active  { background: rgba(255, 255, 255, 0.2); }
    #burst-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Verify button ── */
    #verify-btn {
      position: fixed;
      bottom: 40px;
      left: calc(50% + 50px);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid rgba(100, 200, 255, 0.8);
      background: rgba(0, 40, 100, 0.5);
      color: white;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      line-height: 1.3;
      text-align: center;
      cursor: pointer;
      z-index: 10;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #verify-btn:active   { background: rgba(100, 200, 255, 0.25); }
    #verify-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Verify result overlay ── */
    #verify-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.78);
      z-index: 30;
      align-items: center;
      justify-content: center;
    }
    #verify-card {
      background: #16213e;
      border-radius: 16px;
      padding: 28px 24px 24px;
      max-width: 340px;
      width: 90vw;
      color: white;
      position: relative;
    }
    #verify-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.55);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
    }
    #verify-verdict {
      font-size: 38px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #verify-features {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 14px;
      line-height: 2;
    }
    #verify-reason {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.65;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 12px;
    }
    #verify-dynamic {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 8px;
      line-height: 1.5;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

<!-- Camera screen -->
<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
  <div id="guide-frame">
    <div id="guide-label">拖曳移動 · 角落縮放</div>
    <div class="resize-handle" data-corner="tl"></div>
    <div class="resize-handle" data-corner="tr"></div>
    <div class="resize-handle" data-corner="bl"></div>
    <div class="resize-handle" data-corner="br"></div>
  </div>
  <div id="debug-info">等待相機...</div>
  <button id="burst-btn"   disabled aria-label="連拍十張">連拍</button>
  <button id="capture-btn" disabled aria-label="拍照"></button>
  <button id="verify-btn"  aria-label="驗證防偽">驗證<br>防偽</button>
  <div id="error-msg"></div>
</div>

<!-- Verify result overlay -->
<div id="verify-overlay">
  <div id="verify-card">
    <button id="verify-close" aria-label="關閉">×</button>
    <div id="verify-verdict"></div>
    <div id="verify-features"></div>
    <div id="verify-reason"></div>
    <div id="verify-dynamic"></div>
  </div>
</div>

<!-- Result screen -->
<div id="result-container">
  <div id="result-label">裁切結果預覽</div>
  <img id="result-img" alt="裁切結果">
  <button id="retake-btn">重拍</button>
</div>

<!-- Hidden canvas for cropping -->
<canvas id="canvas" style="display:none"></canvas>

<script>
  const video           = document.getElementById('video');
  const guideFrame      = document.getElementById('guide-frame');
  const debugInfo       = document.getElementById('debug-info');
  const captureBtn      = document.getElementById('capture-btn');
  const burstBtn        = document.getElementById('burst-btn');
  const verifyBtn       = document.getElementById('verify-btn');
  const verifyOverlay   = document.getElementById('verify-overlay');
  const verifyClose     = document.getElementById('verify-close');
  const verifyVerdict   = document.getElementById('verify-verdict');
  const verifyFeatures  = document.getElementById('verify-features');
  const verifyReason    = document.getElementById('verify-reason');
  const verifyDynamic   = document.getElementById('verify-dynamic');
  const errorMsg        = document.getElementById('error-msg');
  const cameraContainer = document.getElementById('camera-container');
  const resultContainer = document.getElementById('result-container');
  const resultImg       = document.getElementById('result-img');
  const retakeBtn       = document.getElementById('retake-btn');
  const canvas          = document.getElementById('canvas');
  const ctx             = canvas.getContext('2d');

  let stream          = null;
  let dragState       = null;
  let lastBurstFrames = null;
  const MIN_W   = 80;
  const MIN_H   = 50;

  // ── Error display ──
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    debugInfo.style.display = 'none';
    captureBtn.disabled = true;
    burstBtn.disabled   = true;
  }

  // ── Initialize frame at center with 1.58:1 ratio ──
  function initFramePosition() {
    const cW = cameraContainer.offsetWidth;
    const cH = cameraContainer.offsetHeight;
    const w  = Math.min(cW * 0.85, cH * 0.85 * 1.58);
    const h  = w / 1.58;
    guideFrame.style.width  = w + 'px';
    guideFrame.style.height = h + 'px';
    guideFrame.style.left   = ((cW - w) / 2) + 'px';
    guideFrame.style.top    = ((cH - h) / 2) + 'px';
  }

  // ── Drag: move entire frame ──
  guideFrame.addEventListener('pointerdown', (e) => {
    if (e.target.dataset.corner) return; // let resize handles take over
    e.preventDefault();
    dragState = {
      type:     'drag',
      startX:   e.clientX,
      startY:   e.clientY,
      origLeft: parseInt(guideFrame.style.left) || 0,
      origTop:  parseInt(guideFrame.style.top)  || 0,
    };
    guideFrame.setPointerCapture(e.pointerId);
  });

  // ── Resize: drag from corner handles ──
  document.querySelectorAll('.resize-handle').forEach(handle => {
    handle.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dragState = {
        type:     'resize',
        corner:   handle.dataset.corner,
        startX:   e.clientX,
        startY:   e.clientY,
        origLeft: parseInt(guideFrame.style.left)   || 0,
        origTop:  parseInt(guideFrame.style.top)    || 0,
        origW:    guideFrame.offsetWidth,
        origH:    guideFrame.offsetHeight,
      };
      handle.setPointerCapture(e.pointerId);
    });
  });

  window.addEventListener('pointermove', (e) => {
    if (!dragState) return;

    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    const cW = cameraContainer.offsetWidth;
    const cH = cameraContainer.offsetHeight;

    if (dragState.type === 'drag') {
      const fW = guideFrame.offsetWidth;
      const fH = guideFrame.offsetHeight;
      guideFrame.style.left = Math.max(0, Math.min(cW - fW, dragState.origLeft + dx)) + 'px';
      guideFrame.style.top  = Math.max(0, Math.min(cH - fH, dragState.origTop  + dy)) + 'px';

    } else {
      let { origLeft, origTop, origW, origH, corner } = dragState;
      let newW = origW, newH = origH, newLeft = origLeft, newTop = origTop;

      if (corner.includes('r')) newW = Math.max(MIN_W, origW + dx);
      if (corner.includes('l')) { newW = Math.max(MIN_W, origW - dx); newLeft = origLeft + origW - newW; }
      if (corner.includes('b')) newH = Math.max(MIN_H, origH + dy);
      if (corner.includes('t')) { newH = Math.max(MIN_H, origH - dy); newTop = origTop + origH - newH; }

      // Clamp within viewport
      newLeft = Math.max(0, Math.min(cW - MIN_W, newLeft));
      newTop  = Math.max(0, Math.min(cH - MIN_H, newTop));
      newW    = Math.max(MIN_W, Math.min(cW - newLeft, newW));
      newH    = Math.max(MIN_H, Math.min(cH - newTop,  newH));

      guideFrame.style.left   = newLeft + 'px';
      guideFrame.style.top    = newTop  + 'px';
      guideFrame.style.width  = newW    + 'px';
      guideFrame.style.height = newH    + 'px';
    }

    updateDebug();
  });

  window.addEventListener('pointerup',     () => { dragState = null; });
  window.addEventListener('pointercancel', () => { dragState = null; });

  // ── Start camera ──
  async function startCamera() {
    errorMsg.style.display  = 'none';
    debugInfo.style.display = '';
    captureBtn.disabled     = true;
    burstBtn.disabled       = true;
    debugInfo.textContent   = '等待相機...';

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width:  { ideal: 1920 },
          height: { ideal: 1080 }
        }
      });
    } catch (_) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
      } catch (err) {
        showError('無法存取相機。\n請確認已允許相機存取權限後重新整理頁面。');
        return;
      }
    }

    video.srcObject = stream;
  }

  video.addEventListener('loadedmetadata', () => {
    captureBtn.disabled = false;
    burstBtn.disabled   = false;
    updateDebug();
  });

  // ── Calculate crop parameters (compensates for object-fit: cover offset) ──
  function calcCropParams() {
    const displayW = video.offsetWidth;
    const displayH = video.offsetHeight;
    const vW = video.videoWidth;
    const vH = video.videoHeight;

    const ratio   = Math.max(displayW / vW, displayH / vH);
    const offsetX = (vW - displayW / ratio) / 2;
    const offsetY = (vH - displayH / ratio) / 2;

    const frameRect = guideFrame.getBoundingClientRect();
    const videoRect = video.getBoundingClientRect();

    const cssX = frameRect.left - videoRect.left;
    const cssY = frameRect.top  - videoRect.top;
    const cssW = frameRect.width;
    const cssH = frameRect.height;

    const srcX = Math.max(0, cssX / ratio + offsetX);
    const srcY = Math.max(0, cssY / ratio + offsetY);
    const srcW = Math.min(cssW / ratio, vW - srcX);
    const srcH = Math.min(cssH / ratio, vH - srcY);

    return { ratio, offsetX, offsetY, srcX, srcY, srcW, srcH };
  }

  // ── Debug overlay — shows current frame ratio for prototype testing ──
  function updateDebug() {
    if (!video.videoWidth) return;
    const p          = calcCropParams();
    const frameRatio = (guideFrame.offsetWidth / guideFrame.offsetHeight).toFixed(3);
    debugInfo.textContent =
      `框 ${frameRatio}:1  |  ` +
      `src (${p.srcX.toFixed(0)}, ${p.srcY.toFixed(0)})  ` +
      `${p.srcW.toFixed(0)}×${p.srcH.toFixed(0)}px`;
  }

  window.addEventListener('resize', () => {
    if (!dragState) initFramePosition();
    updateDebug();
  });

  // ── Capture ──
  captureBtn.addEventListener('click', () => {
    if (!video.videoWidth) return;

    const p = calcCropParams();
    canvas.width  = Math.round(p.srcW);
    canvas.height = Math.round(p.srcH);
    ctx.drawImage(video, p.srcX, p.srcY, p.srcW, p.srcH, 0, 0, canvas.width, canvas.height);

    resultImg.src = canvas.toDataURL('image/jpeg', 0.92);

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }

    burstBtn.disabled = true;
    cameraContainer.style.display = 'none';
    resultContainer.style.display = 'flex';
  });

  // ── Retake ──
  retakeBtn.addEventListener('click', () => {
    resultContainer.style.display = 'none';
    cameraContainer.style.display = 'block';
    startCamera().catch(() => showError('無法存取相機。\n請確認已允許相機存取權限後重新整理頁面。'));
  });

  // ── Burst capture ──
  burstBtn.addEventListener('click', () => {
    if (!video.videoWidth) return;

    const TOTAL     = 10;
    const INTERVAL  = 300; // ms → 10 frames in 3 s
    const frames    = [];
    let   count     = 0;

    burstBtn.disabled  = true;
    captureBtn.disabled = true;

    const tick = () => {
      count++;
      burstBtn.textContent = `${count}/${TOTAL}`;

      // Crop current frame
      const p = calcCropParams();
      const tmp = document.createElement('canvas');
      tmp.width  = Math.round(p.srcW);
      tmp.height = Math.round(p.srcH);
      tmp.getContext('2d').drawImage(
        video, p.srcX, p.srcY, p.srcW, p.srcH,
        0, 0, tmp.width, tmp.height
      );
      // Store base64 payload only (strip data-URL prefix)
      frames.push(tmp.toDataURL('image/jpeg', 0.92).split(',')[1]);

      if (count >= TOTAL) {
        clearInterval(timerId);
        burstBtn.textContent = '打包中';

        const zip = new JSZip();
        frames.forEach((b64, i) => {
          zip.file(`burst_${String(i + 1).padStart(2, '0')}.jpg`, b64, { base64: true });
        });

        const now = new Date();
        const ts  =
          now.getFullYear() +
          String(now.getMonth() + 1).padStart(2, '0') +
          String(now.getDate()).padStart(2, '0') + '_' +
          String(now.getHours()).padStart(2, '0') +
          String(now.getMinutes()).padStart(2, '0') +
          String(now.getSeconds()).padStart(2, '0');

        zip.generateAsync({ type: 'blob' }).then(blob => {
          const url = URL.createObjectURL(blob);
          const a   = document.createElement('a');
          a.href     = url;
          a.download = `burst_${ts}.zip`;
          a.click();
          URL.revokeObjectURL(url);

          lastBurstFrames      = frames;
          burstBtn.textContent = '連拍';
          burstBtn.disabled    = false;
          captureBtn.disabled  = false;
          verifyBtn.style.display = 'flex';
        });
      }
    };

    const timerId = setInterval(tick, INTERVAL);
  });

  // ── Verify anti-counterfeit ──
  const VERIFY_API = 'https://untaken-lively-molecule.ngrok-free.dev/v1/chat/completions';
  const VERIFY_PROMPT = `你是一位專業的證件防偽鑑定專家，精通台灣身分證（第六代）的數位防偽特徵辨識。

分析提供的 10 張連續翻轉/傾斜的身分證影像。你的目標是辨識位於大頭照下方的「透明視覺變化裝置」（雷射防偽標籤）是否真實存在，並根據其動態變化給出判斷。

辨識關鍵特徵：
1. 放射狀漸層「台灣」圖案：隨角度變換應出現放射狀漸層變化的台灣島廓圖案
2. 大小漸次變化「蝴蝶」圖案：隨著影像翻轉，蝴蝶的大小應有視覺上的連貫縮放變化
3. 七彩變化「TAIWAN」字樣：具備七彩虹光變化的英文字母

請依序編號為 Frame 1 至 Frame 10，逐一檢查每張影像中照片下方的防偽裝置。

請以 JSON 格式回報（不要有其他文字）：
{
  "total_frames": 10,
  "frames_with_label": ["Frame 1", "Frame 3"],
  "features_detected": {
    "taiwan_map": true,
    "butterfly_scaling": false,
    "rainbow_taiwan_text": true
  },
  "dynamic_check": "描述標籤隨角度變化的觀察結果",
  "final_verdict": "PASS",
  "reason": "判斷原因簡述"
}`;

  verifyBtn.addEventListener('click', async () => {
    if (!lastBurstFrames) return;

    verifyBtn.textContent = '驗證中…';
    verifyBtn.disabled    = true;

    const content = [{ type: 'text', text: VERIFY_PROMPT }];
    lastBurstFrames.forEach(b64 => {
      content.push({ type: 'image_url', image_url: { url: `data:image/jpeg;base64,${b64}` } });
    });

    try {
      const res = await fetch(VERIFY_API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true',
        },
        body: JSON.stringify({
          model: 'google/gemma-4-E4B-it',
          messages: [{ role: 'user', content }],
          temperature: 0.1,
          max_tokens: 1024,
        }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      let raw = data.choices?.[0]?.message?.content ?? '';

      // Strip markdown code fence if present
      raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();

      const result = JSON.parse(raw);

      const verdictColor = { PASS: '#4ade80', FAIL: '#f87171', UNCERTAIN: '#fb923c' };
      verifyVerdict.textContent = result.final_verdict ?? '?';
      verifyVerdict.style.color = verdictColor[result.final_verdict] ?? '#fff';

      const fd = result.features_detected ?? {};
      const icon = v => v ? '✅' : '❌';
      verifyFeatures.innerHTML =
        `${icon(fd.taiwan_map)} 台灣島廓圖案<br>` +
        `${icon(fd.butterfly_scaling)} 蝴蝶縮放變化<br>` +
        `${icon(fd.rainbow_taiwan_text)} 七彩 TAIWAN 字樣`;

      verifyReason.textContent  = result.reason ?? '';
      verifyDynamic.textContent = result.dynamic_check ?? '';

      verifyOverlay.style.display = 'flex';
    } catch (err) {
      alert(`驗證失敗：${err.message}`);
    } finally {
      verifyBtn.textContent = '驗證\n防偽';
      verifyBtn.innerHTML   = '驗證<br>防偽';
      verifyBtn.disabled    = false;
    }
  });

  verifyClose.addEventListener('click', () => {
    verifyOverlay.style.display = 'none';
  });

  // ── Init ──
  initFramePosition();
  startCamera().catch(() => showError('無法存取相機。\n請確認已允許相機存取權限後重新整理頁面。'));
</script>

</body>
</html>
